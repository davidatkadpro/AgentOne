<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AgentOne</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --border: #2a2f3a;
      --text: #d6dae3;
      --muted: #8a93a6;
      --accent: #7aa2f7;
      --user: #9ece6a;
      --assistant: #7aa2f7;
      --system: #c0caf5;
      --err: #f7768e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
    }
    aside {
      width: 260px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 12px;
      overflow-y: auto;
    }
    aside h2 {
      margin: 4px 0 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    aside button.new {
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: #0f1115;
      border: 0;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    aside .session {
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
      border: 1px solid transparent;
    }
    aside .session:hover { background: rgba(255,255,255,0.03); }
    aside .session.active { color: var(--text); border-color: var(--border); background: rgba(122,162,247,0.08); }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .turn {
      margin: 12px 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .turn .role {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .turn.user .role { color: var(--user); }
    .turn.assistant .role { color: var(--assistant); }
    .turn.system .role { color: var(--system); }
    .meta {
      font-size: 12px;
      color: var(--muted);
      padding: 4px 12px;
      font-style: italic;
    }
    .meta.error { color: var(--err); }
    .tool-chip {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin: 4px 4px 0 0;
      background: rgba(122,162,247,0.12);
      color: var(--accent);
      border: 1px solid rgba(122,162,247,0.25);
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .tool-chip.running {
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border-color: var(--border);
    }
    .tool-chip.failed {
      background: rgba(247,118,142,0.12);
      color: var(--err);
      border-color: rgba(247,118,142,0.3);
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 10px;
      display: flex;
      gap: 8px;
      background: var(--panel);
    }
    footer textarea {
      flex: 1;
      resize: none;
      min-height: 56px;
      max-height: 200px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font: inherit;
    }
    footer button {
      padding: 0 16px;
      background: var(--accent);
      color: var(--bg);
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    footer button:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty {
      color: var(--muted);
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <aside>
    <button class="new" id="new-session">+ New conversation</button>
    <h2>Sessions</h2>
    <div id="sessions"></div>
  </aside>
  <main>
    <div id="log"><div class="empty">Start a new conversation to begin.</div></div>
    <footer>
      <textarea id="input" placeholder="Message (Ctrl+Enter to send)"></textarea>
      <button id="send" disabled>Send</button>
    </footer>
  </main>
  <script type="module" src="/client.js"></script>
</body>
</html>
